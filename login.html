<!DOCTYPE html>
<html lang="en" dir="ltr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | MURO Muralist Portfolio</title>
    <link rel="icon" type="image/png" href="assets/images/favicon.png">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="auth-page" data-theme="light">
    <div class="auth-card glass">
        <a href="index.html" class="logo">
            <img src="assets/images/logo.png" alt="MURO Logo">
        </a>
        <h2>Welcome Back</h2>
        <form>
            <div class="form-group">
                <input type="email" placeholder="Email Address" required>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="auth-row auth-remember-row">
                <label class="auth-remember">
                    <input type="checkbox" id="remember" />
                    Remember me
                </label>
                <a href="#" class="auth-link">Forgot password?</a>
            </div>
            <button type="submit" class="btn btn-primary">Login</button>
        </form>

        <div class="auth-social">
            <div class="auth-social-title">Or continue with</div>
            <div class="auth-social-icons">
                <a href="#" title="Instagram"><i class="fab fa-instagram"></i></a>
                <a href="#" title="Behance"><i class="fab fa-behance"></i></a>
                <a href="#" title="Dribbble"><i class="fab fa-dribbble"></i></a>
                <a href="#" title="Facebook"><i class="fab fa-facebook-f"></i></a>
            </div>
        </div>

        <div class="auth-footer">
            <p>Don't have an account? <a href="register.html">Register</a></p>
        </div>
    </div>
</body>
</html>
